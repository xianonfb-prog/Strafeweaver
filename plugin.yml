name: Build Strafeweaver Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code from your repository
    - uses: actions/checkout@v4

    # 2. Set up Java 21 (Required for 1.21.1)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Build the plugin using Maven
    - name: Build with Maven
      run: mvn clean package

    # 4. Upload the finished .jar file as an Artifact
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Strafeweaver-Plugin-JAR
        path: target/Strafeweaver-1.0.0.jar
