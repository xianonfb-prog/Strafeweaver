name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Sort files into Maven structure
        run: |
          mkdir -p src/main/java/com/soulstealer
          mkdir -p src/main/resources

          # Move plugin.yml into resources
          if [ -f plugin.yml ]; then
            mv plugin.yml src/main/resources/plugin.yml
          fi

          # Move every .java file sitting at the root into the source folder
          for f in *.java; do
            if [ -f "$f" ]; then
              mv "$f" src/main/java/com/soulstealer/
            fi
          done

      - name: List repo contents (debug)
        run: find . -maxdepth 6 -not -path '*/.git*'

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: List target contents (debug)
        run: find . -name "*.jar" -not -path '*/.git*'

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: Soulstealer-plugin
          path: |
            **/target/*.jar
          if-no-files-found: warn
